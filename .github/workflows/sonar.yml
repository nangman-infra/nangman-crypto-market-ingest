name: SonarQube

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.94.0"

jobs:
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile minimal --component rustfmt --component clippy
          rustup default "${RUST_TOOLCHAIN}"
          cargo --version
          cargo fmt --version
          cargo clippy --version

      - name: Run Rust fmt gate
        run: cargo fmt --all --check

      - name: Run Clippy gate
        run: cargo clippy --all-targets -- -D warnings

      - name: Run Rust test gate
        run: cargo test --all-targets

      - name: Run repository contract gate
        run: |
          bash -n scripts/deploy.sh
          bash -n scripts/check-runtime.sh
          bash -n scripts/check-ecr-scan.sh
          bash -n scripts/render-ecs-task-definition.sh
          bash -n scripts/diagnose-l1-staleness.sh
          bash -n scripts/check-release-readiness.sh
          bash -n scripts/prepare-release-artifacts.sh
          MARKET_INGEST_RUNTIME_SELF_TEST=1 bash scripts/check-runtime.sh
          MARKET_INGEST_ECR_SCAN_SELF_TEST=1 bash scripts/check-ecr-scan.sh
          MARKET_INGEST_RENDER_TASK_DEFINITION_SELF_TEST=1 bash scripts/render-ecs-task-definition.sh
          MARKET_INGEST_DIAGNOSE_L1_SELF_TEST=1 bash scripts/diagnose-l1-staleness.sh
          MARKET_INGEST_PREPARE_RELEASE_SELF_TEST=1 bash scripts/prepare-release-artifacts.sh
          python3 scripts/check-repository-contract.py

  sonarqube:
    name: SonarQube Scan
    needs: quality-checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile minimal --component clippy
          rustup default "${RUST_TOOLCHAIN}"
          cargo --version
          cargo clippy --version

      - name: Generate Clippy report for SonarQube
        run: |
          mkdir -p sonar-reports
          cargo clippy --all-targets --message-format=json --quiet > sonar-reports/clippy.json

      - name: Generate coverage report for SonarQube
        run: |
          cargo install cargo-llvm-cov --locked
          cargo llvm-cov --all-targets --lcov --output-path sonar-reports/lcov.info
          test -s sonar-reports/lcov.info

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v7
        with:
          args: >
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=600
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL != '' && vars.SONAR_HOST_URL || secrets.SONAR_HOST_URL }}

      - name: Print SonarQube quality gate details
        if: failure()
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL != '' && vars.SONAR_HOST_URL || secrets.SONAR_HOST_URL }}
        run: |
          task_file=".scannerwork/report-task.txt"
          if [ ! -f "${task_file}" ]; then
            echo "SonarQube task metadata was not generated."
            exit 0
          fi

          ce_task_id="$(awk -F= '/^ceTaskId=/ { print $2 }' "${task_file}")"
          if [ -z "${ce_task_id}" ]; then
            echo "SonarQube task id was not found."
            exit 0
          fi

          analysis_id=""
          for attempt in $(seq 1 10); do
            task_json="$(curl --silent --show-error --user "${SONAR_TOKEN}:" "${SONAR_HOST_URL}/api/ce/task?id=${ce_task_id}" || true)"
            if [ -z "${task_json}" ]; then
              echo "SonarQube task response was empty."
              exit 0
            fi

            analysis_id="$(TASK_JSON="${task_json}" python3 -c 'import json, os; print(json.loads(os.environ["TASK_JSON"]).get("task", {}).get("analysisId", ""))' || true)"
            if [ -n "${analysis_id}" ]; then
              break
            fi
            echo "SonarQube analysis id was not available yet; retry ${attempt}/10."
            sleep 3
          done

          if [ -z "${analysis_id}" ]; then
            echo "SonarQube analysis id was not available yet."
            exit 0
          fi

          gate_json="$(curl --silent --show-error --user "${SONAR_TOKEN}:" "${SONAR_HOST_URL}/api/qualitygates/project_status?analysisId=${analysis_id}" || true)"
          if [ -z "${gate_json}" ]; then
            echo "SonarQube quality gate response was empty."
            exit 0
          fi

          GATE_JSON="${gate_json}" python3 -c 'import json, os; data = json.loads(os.environ["GATE_JSON"]); status = data.get("projectStatus", {}); print("SonarQube quality gate: {}".format(status.get("status", "UNKNOWN"))); [print("{}: {} actual={} threshold={} comparator={}".format(condition.get("status", "UNKNOWN"), condition.get("metricKey", "unknown_metric"), condition.get("actualValue", "n/a"), condition.get("errorThreshold", "n/a"), condition.get("comparator", "n/a"))) for condition in status.get("conditions", [])]'

          issues_json="$(curl --silent --show-error --user "${SONAR_TOKEN}:" --get "${SONAR_HOST_URL}/api/issues/search" --data-urlencode "componentKeys=nangman-crypto-market-ingest" --data-urlencode "resolved=false" --data-urlencode "inNewCodePeriod=true" --data-urlencode "ps=20" || true)"
          if [ -z "${issues_json}" ]; then
            echo "SonarQube issue response was empty."
            exit 0
          fi

          ISSUES_JSON="${issues_json}" python3 -c 'import json, os; data = json.loads(os.environ["ISSUES_JSON"]); [print("SonarQube issue: {} {} {}:{}".format(issue.get("severity", "UNKNOWN"), issue.get("rule", "unknown-rule"), issue.get("component", "unknown"), issue.get("line", "n/a")) + " " + issue.get("message", "")) for issue in data.get("issues", [])]'
