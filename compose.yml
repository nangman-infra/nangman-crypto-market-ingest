name: nangman-crypto-market-ingest

x-market-ingest-common: &market-ingest-common
  build:
    context: ${MARKET_INGEST_REPO_ROOT:-.}
    dockerfile: ${MARKET_INGEST_REPO_ROOT:-.}/Dockerfile
    args:
      NANGMAN_GIT_SHA: ${NANGMAN_GIT_SHA:-unknown}
      NANGMAN_GIT_DIRTY: ${NANGMAN_GIT_DIRTY:-true}
  image: nangman-crypto-market-ingest-app:dev
  restart: unless-stopped
  environment:
    AWS_CONFIG_FILE: /home/market-ingest/.aws/config
    AWS_PROFILE: ${AWS_PROFILE:-market-ingest-roles-anywhere}
    AWS_REGION: ${AWS_REGION:-ap-northeast-2}
    AWS_SDK_LOAD_CONFIG: "1"
    AWS_SHARED_CREDENTIALS_FILE: /home/market-ingest/.aws/credentials
    MARKET_INGEST_LOG_LEVEL: ${MARKET_INGEST_LOG_LEVEL:-info}
  volumes:
    - ${MARKET_INGEST_SPOOL_ROOT:-/opt/nangman-crypto/data/spool/market-ingest/l0}:/opt/nangman-crypto/data/spool/market-ingest/l0
    - ${MARKET_NORMALIZE_SPOOL_ROOT:-/opt/nangman-crypto/data/spool/market-ingest/l1}:/opt/nangman-crypto/data/spool/market-ingest/l1
    - ${MARKET_NORMALIZE_CATCHUP_TMP_ROOT:-/opt/nangman-crypto/data/spool/market-normalize/catchup}:/opt/nangman-crypto/data/spool/market-normalize/catchup

services:
  binance:
    <<: *market-ingest-common
    command:
      - --venue
      - binance
      - --config
      - /opt/nangman-crypto/strategies/crypto/rust-engine/config
      - --duration-seconds
      - ${MARKET_INGEST_DURATION_SECONDS:-300}
      - --log-interval-seconds
      - ${MARKET_INGEST_LOG_INTERVAL_SECONDS:-30}
      - --depth-snapshot-limit
      - ${BINANCE_DEPTH_SNAPSHOT_LIMIT:-100}
      - --binance-futures-rest-base-url
      - ${BINANCE_FUTURES_REST_BASE_URL:-https://fapi.binance.com}
      - --expect-symbol-count
      - ${MARKET_INGEST_EXPECT_SYMBOL_COUNT:-50}
      - --allow-partial-symbol-coverage
      - --l0-s3-bucket
      - ${MARKET_L0_BUCKET:?MARKET_L0_BUCKET is required}
      - --aws-profile
      - ${AWS_PROFILE:-market-ingest-roles-anywhere}
      - --aws-region
      - ${AWS_REGION:-ap-northeast-2}
      - --l0-flush-records
      - ${MARKET_INGEST_L0_FLUSH_RECORDS:-1000}
      - --l0-shard-count
      - ${MARKET_INGEST_L0_SHARD_COUNT:-1}
      - --local-disk-high-water-pct
      - ${MARKET_INGEST_LOCAL_DISK_HIGH_WATER_PCT:-70}
      - --local-disk-emergency-pct
      - ${MARKET_INGEST_LOCAL_DISK_EMERGENCY_PCT:-90}
      - --safety-floor-hours
      - ${MARKET_INGEST_SAFETY_FLOOR_HOURS:-2}
      - --eviction-check-interval-secs
      - ${MARKET_INGEST_EVICTION_CHECK_INTERVAL_SECS:-600}

  market-normalize:
    <<: *market-ingest-common
    stop_grace_period: 30m
    entrypoint:
      - /usr/local/bin/market-normalize
    command:
      - --l0-s3-bucket
      - ${MARKET_L0_BUCKET:?MARKET_L0_BUCKET is required}
      - --l0-local-root
      - /opt/nangman-crypto/data/spool/market-ingest/l0
      - --l1-s3-bucket
      - ${MARKET_L1_BUCKET:?MARKET_L1_BUCKET is required}
      - --aws-profile
      - ${AWS_PROFILE:-market-ingest-roles-anywhere}
      - --aws-region
      - ${AWS_REGION:-ap-northeast-2}
      - --schedule-interval-ms
      - ${MARKET_NORMALIZE_SCHEDULE_INTERVAL_MS:-900000}
      - --window-ms
      - ${MARKET_NORMALIZE_WINDOW_MS:-1000}
      - --scan-margin-ms
      - ${MARKET_NORMALIZE_SCAN_MARGIN_MS:-300000}
      - --watermark-delay-ms
      - ${MARKET_NORMALIZE_WATERMARK_DELAY_MS:-360000}
      - --clock-skew-margin-ms
      - ${MARKET_NORMALIZE_CLOCK_SKEW_MARGIN_MS:-1000}
      - --max-latency-ms
      - ${MARKET_NORMALIZE_MAX_LATENCY_MS:-1000}
      - --l0-run-key-overlap-ms
      - ${MARKET_NORMALIZE_L0_RUN_KEY_OVERLAP_MS:-360000}
      - --max-windows-per-tick
      - ${MARKET_NORMALIZE_MAX_WINDOWS_PER_TICK:-192}
      - --live-priority
      - --live-priority-lag-threshold-ms
      - ${MARKET_NORMALIZE_LIVE_PRIORITY_LAG_THRESHOLD_MS:-900000}
      - --spool-root
      - /opt/nangman-crypto/data/spool/market-ingest/l1
      - --catchup-tmp-root
      - /opt/nangman-crypto/data/spool/market-normalize/catchup

  upbit:
    <<: *market-ingest-common
    command:
      - --venue
      - upbit
      - --config
      - /opt/nangman-crypto/strategies/crypto/rust-engine/config
      - --duration-seconds
      - ${MARKET_INGEST_DURATION_SECONDS:-300}
      - --log-interval-seconds
      - ${MARKET_INGEST_LOG_INTERVAL_SECONDS:-30}
      - --expect-symbol-count
      - ${MARKET_INGEST_EXPECT_SYMBOL_COUNT:-50}
      - --upbit-orderbook-unit
      - ${UPBIT_ORDERBOOK_UNIT:-5}
      - --l0-s3-bucket
      - ${MARKET_L0_BUCKET:?MARKET_L0_BUCKET is required}
      - --aws-profile
      - ${AWS_PROFILE:-market-ingest-roles-anywhere}
      - --aws-region
      - ${AWS_REGION:-ap-northeast-2}
      - --l0-flush-records
      - ${MARKET_INGEST_L0_FLUSH_RECORDS:-1000}
      - --l0-shard-count
      - ${MARKET_INGEST_L0_SHARD_COUNT:-1}
      - --local-disk-high-water-pct
      - ${MARKET_INGEST_LOCAL_DISK_HIGH_WATER_PCT:-70}
      - --local-disk-emergency-pct
      - ${MARKET_INGEST_LOCAL_DISK_EMERGENCY_PCT:-90}
      - --safety-floor-hours
      - ${MARKET_INGEST_SAFETY_FLOOR_HOURS:-2}
      - --eviction-check-interval-secs
      - ${MARKET_INGEST_EVICTION_CHECK_INTERVAL_SECS:-600}
